# Dev-dependency canary. Monthly R CMD check against the development version of
# ggplot2. The compose_grob() pipeline tracks ggplot2 internals closely (coord
# transforms, panel params, theme-resolved defaults), so upstream breakage
# surfaces here as advance notice rather than a release-time surprise.
# Scheduled-run failures email the maintainer.

on:
  schedule:
    - cron: "0 3 1 * *" # 03:00 UTC on the 1st of each month
  workflow_dispatch:

name: dev-ggplot2

permissions: read-all

jobs:
  dev-ggplot2:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            tidyverse/ggplot2
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
